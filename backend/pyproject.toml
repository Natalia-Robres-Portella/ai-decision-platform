[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.coverage.run]
source = ["app"]
omit = ["tests/*"]

# ---------------------------------------------------------------------------
# Ruff — Python linter + formatter (replaces flake8, isort, black)
#
# line-length = 100: slightly wider than black's 88, accommodates our longer
#   type annotations and f-strings without forcing ugly line breaks.
# target-version = "py311": enables rules that require 3.11+ syntax.
# select = ["E", "F", "I"]: pycodestyle errors, pyflakes, isort.
#   Deliberately not selecting "N" (naming) or "ANN" (annotations) — those
#   are too opinionated for a learning project.
# ---------------------------------------------------------------------------
[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I"]
ignore = [
    "E501",  # line too long — handled by line-length setting above
]
